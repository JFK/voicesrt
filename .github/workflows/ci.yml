name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Create data directories and run migrations
        run: |
          mkdir -p data/db data/uploads data/audio data/srt
          python -c "from src.database import ensure_dirs, run_migrations; ensure_dirs(); run_migrations()"
        env:
          ENCRYPTION_KEY: "dGVzdC1rZXktZm9yLWNpLW9ubHktMTIzNDU2Nzg5MGFi"

      - name: Test with coverage
        run: pytest --cov=src --cov-report=xml --cov-report=term -v --ignore=tests/e2e
        env:
          ENCRYPTION_KEY: "dGVzdC1rZXktZm9yLWNpLW9ubHktMTIzNDU2Nzg5MGFi"

      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Create data directories and run migrations
        run: |
          mkdir -p data/db data/uploads data/audio data/srt
          python -c "from src.database import ensure_dirs, run_migrations; ensure_dirs(); run_migrations()"
        env:
          ENCRYPTION_KEY: "dGVzdC1rZXktZm9yLWNpLW9ubHktMTIzNDU2Nzg5MGFi"

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --screenshot=only-on-failure --output=test-results
        env:
          ENCRYPTION_KEY: "dGVzdC1rZXktZm9yLWNpLW9ubHktMTIzNDU2Nzg5MGFi"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: test-results/
          retention-days: 7

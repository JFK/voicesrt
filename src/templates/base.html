<!DOCTYPE html>
<html lang="{{ lang }}" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VoiceSRT{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {% block head_scripts %}{% endblock %}
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="h-full" hx-headers='{"X-Requested-With": "XMLHttpRequest"}'>
    <div class="min-h-full">
        <nav class="bg-gray-800">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex h-16 items-center justify-between">
                    <div class="flex items-center">
                        <a href="/" class="text-white font-bold text-xl">VoiceSRT</a>
                        <div class="ml-10 flex items-baseline space-x-4">
                            <a href="/"
                               class="{% if active_page == 'upload' %}bg-gray-900 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %} rounded-md px-3 py-2 text-sm font-medium">
                                {{ t('nav.upload') }}
                            </a>
                            <a href="/history"
                               class="{% if active_page == 'history' %}bg-gray-900 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %} rounded-md px-3 py-2 text-sm font-medium">
                                {{ t('nav.history') }}
                            </a>
                            <a href="/costs"
                               class="{% if active_page == 'costs' %}bg-gray-900 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %} rounded-md px-3 py-2 text-sm font-medium">
                                {{ t('nav.costs') }}
                            </a>
                            <a href="/settings"
                               class="{% if active_page == 'settings' %}bg-gray-900 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %} rounded-md px-3 py-2 text-sm font-medium">
                                {{ t('nav.settings') }}
                            </a>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2 text-sm">
                        <a href="/lang/en" class="text-gray-300 hover:text-white px-2 py-1 rounded {% if lang == 'en' %}bg-gray-700 text-white{% endif %}">EN</a>
                        <span class="text-gray-500">|</span>
                        <a href="/lang/ja" class="text-gray-300 hover:text-white px-2 py-1 rounded {% if lang == 'ja' %}bg-gray-700 text-white{% endif %}">JA</a>
                    </div>
                </div>
            </div>
        </nav>

        <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Global toast notifications -->
    <div x-data="toastManager()" x-ref="toastContainer"
         class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm"
         @show-toast.window="add($event.detail)">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-show="toast.visible"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-2"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100"
                 x-transition:leave-end="opacity-0"
                 :class="{
                     'bg-red-50 border-red-300 text-red-800': toast.type === 'error',
                     'bg-yellow-50 border-yellow-300 text-yellow-800': toast.type === 'warning',
                     'bg-green-50 border-green-300 text-green-800': toast.type === 'success'
                 }"
                 class="border rounded-lg shadow-lg p-4 flex items-start gap-3"
                 role="alert">
                <div class="flex-1 text-sm whitespace-pre-line" x-text="toast.message"></div>
                <button @click="dismiss(toast.id)" class="text-current opacity-50 hover:opacity-100 flex-shrink-0" aria-label="Dismiss">&times;</button>
            </div>
        </template>
    </div>
    <script>
    function toastManager() {
        return {
            toasts: [],
            _nextId: 0,
            add({message, type = 'error', duration = 10000}) {
                const id = ++this._nextId;
                this.toasts.push({id, message, type, visible: true});
                if (duration > 0) {
                    setTimeout(() => this.dismiss(id), duration);
                }
            },
            dismiss(id) {
                const t = this.toasts.find(t => t.id === id);
                if (t) t.visible = false;
                setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 300);
            }
        };
    }
    function showToast(message, type = 'error', duration = 10000) {
        window.dispatchEvent(new CustomEvent('show-toast', {detail: {message, type, duration}}));
    }
    </script>
</body>
</html>

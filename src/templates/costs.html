{% extends "base.html" %}
{% block title %}Costs - VideoSRT{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">Cost Dashboard</h1>

<div x-data="costDashboard()" x-init="loadCosts()">
    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-white shadow rounded-lg p-6">
            <p class="text-sm text-gray-500">Total Cost</p>
            <p class="text-3xl font-bold text-gray-900" x-text="'$' + data.total.toFixed(4)">$0.00</p>
        </div>
        <template x-for="(cost, provider) in data.by_provider" :key="provider">
            <div class="bg-white shadow rounded-lg p-6">
                <p class="text-sm text-gray-500" x-text="provider"></p>
                <p class="text-2xl font-bold text-gray-900" x-text="'$' + cost.toFixed(4)"></p>
            </div>
        </template>
    </div>

    <!-- Monthly Breakdown -->
    <div class="bg-white shadow rounded-lg p-6 mb-6" x-show="data.by_month.length > 0">
        <h2 class="text-lg font-medium text-gray-900 mb-4">Monthly Costs</h2>
        <table class="min-w-full divide-y divide-gray-200">
            <thead>
                <tr>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Month</th>
                    <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Cost</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                <template x-for="item in data.by_month" :key="item.month">
                    <tr>
                        <td class="px-4 py-2 text-sm text-gray-900" x-text="item.month"></td>
                        <td class="px-4 py-2 text-sm text-gray-900" x-text="'$' + item.cost.toFixed(4)"></td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <!-- Recent Logs -->
    <div class="bg-white shadow rounded-lg p-6">
        <h2 class="text-lg font-medium text-gray-900 mb-4">Recent API Calls</h2>
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead>
                    <tr>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Provider</th>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Model</th>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Operation</th>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Duration</th>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Cost</th>
                        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    <template x-for="log in data.recent" :key="log.created_at">
                        <tr>
                            <td class="px-4 py-2 text-sm" x-text="log.provider"></td>
                            <td class="px-4 py-2 text-sm" x-text="log.model"></td>
                            <td class="px-4 py-2 text-sm" x-text="log.operation"></td>
                            <td class="px-4 py-2 text-sm" x-text="log.audio_duration ? log.audio_duration.toFixed(1) + 's' : '-'"></td>
                            <td class="px-4 py-2 text-sm font-medium" x-text="'$' + log.estimated_cost.toFixed(4)"></td>
                            <td class="px-4 py-2 text-sm text-gray-500" x-text="log.created_at?.slice(0, 16).replace('T', ' ')"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
        <p x-show="data.recent.length === 0" class="text-sm text-gray-500 text-center py-4">No API calls yet.</p>
    </div>
</div>

<script>
function costDashboard() {
    return {
        data: { total: 0, by_provider: {}, by_operation: {}, by_month: [], recent: [] },
        async loadCosts() {
            const res = await fetch('/api/costs');
            this.data = await res.json();
        }
    };
}
</script>
{% endblock %}

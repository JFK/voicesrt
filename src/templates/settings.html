{% extends "base.html" %}
{% block title %}Settings - VideoSRT{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">Settings</h1>

<div class="space-y-6" x-data="settingsPage()" x-init="loadSettings()">
    <!-- API Keys -->
    <div class="bg-white shadow rounded-lg p-6">
        <h2 class="text-lg font-medium text-gray-900 mb-4">API Keys</h2>
        <div class="space-y-4">
            <template x-for="p in providers" :key="p.id">
                <div class="border rounded-lg p-4">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="font-medium text-gray-900" x-text="p.label"></h3>
                        <span x-show="p.configured" class="text-xs bg-green-100 text-green-800 px-2 py-1 rounded-full">Configured</span>
                    </div>
                    <div class="flex space-x-2">
                        <input :type="p.showKey ? 'text' : 'password'"
                               x-model="p.newKey"
                               :placeholder="p.configured ? p.masked : 'Enter API key'"
                               class="flex-1 rounded-md border-gray-300 text-sm p-2 border">
                        <button @click="saveKey(p)" :disabled="!p.newKey"
                                class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700 disabled:bg-gray-400">
                            Save
                        </button>
                        <button @click="testKey(p)" :disabled="!p.configured"
                                class="px-4 py-2 bg-gray-100 border border-gray-300 rounded-md text-sm hover:bg-gray-200 disabled:opacity-50">
                            Test
                        </button>
                        <button x-show="p.configured" @click="deleteKey(p)"
                                class="px-4 py-2 bg-red-100 text-red-700 rounded-md text-sm hover:bg-red-200">
                            Del
                        </button>
                    </div>
                    <p x-show="p.testResult !== null" class="mt-2 text-sm"
                       :class="p.testResult ? 'text-green-600' : 'text-red-600'"
                       x-text="p.testResult ? 'Key is valid' : 'Key is invalid: ' + p.testError">
                    </p>
                </div>
            </template>
        </div>
    </div>

    <!-- Model Selection -->
    <div class="bg-white shadow rounded-lg p-6">
        <h2 class="text-lg font-medium text-gray-900 mb-4">LLM Models</h2>
        <p class="text-sm text-gray-500 mb-4">Models used for YouTube metadata generation.</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">OpenAI Model</label>
                <div class="flex space-x-2">
                    <input type="text" x-model="models.openai"
                           class="flex-1 rounded-md border-gray-300 text-sm p-2 border">
                    <button @click="saveModel('openai', models.openai)"
                            class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700">Save</button>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Gemini Model</label>
                <div class="flex space-x-2">
                    <input type="text" x-model="models.gemini"
                           class="flex-1 rounded-md border-gray-300 text-sm p-2 border">
                    <button @click="saveModel('gemini', models.gemini)"
                            class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm hover:bg-blue-700">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Logo Upload -->
    <div class="bg-white shadow rounded-lg p-6">
        <h2 class="text-lg font-medium text-gray-900 mb-4">Logo</h2>
        <p class="text-sm text-gray-500 mb-4">Upload a logo image to overlay on videos (top-left corner).</p>
        <div class="flex items-center space-x-4">
            <input type="file" accept="image/*" @change="uploadLogo($event)" class="text-sm">
            <button @click="deleteLogo()" class="px-3 py-1 bg-red-100 text-red-700 rounded-md text-sm hover:bg-red-200">
                Remove Logo
            </button>
        </div>
        <p x-show="logoMsg" class="mt-2 text-sm text-green-600" x-text="logoMsg"></p>
    </div>

    <!-- Status Message -->
    <div x-show="statusMsg" class="bg-green-50 border border-green-200 rounded-lg p-4">
        <p class="text-sm text-green-700" x-text="statusMsg"></p>
    </div>
</div>

<script>
function settingsPage() {
    return {
        providers: [
            { id: 'openai', label: 'OpenAI', configured: false, masked: '', newKey: '', showKey: false, testResult: null, testError: '' },
            { id: 'google', label: 'Google (Gemini)', configured: false, masked: '', newKey: '', showKey: false, testResult: null, testError: '' },
        ],
        models: { openai: 'gpt-4.1', gemini: 'gemini-2.5-flash' },
        statusMsg: '',
        logoMsg: '',

        async loadSettings() {
            // Load keys
            const keysRes = await fetch('/api/settings/keys');
            const keys = await keysRes.json();
            for (const k of keys) {
                const p = this.providers.find(p => p.id === k.provider);
                if (p) {
                    p.configured = true;
                    p.masked = k.masked;
                }
            }
            // Load models
            const modelsRes = await fetch('/api/settings/models');
            const modelsData = await modelsRes.json();
            this.models = { ...this.models, ...modelsData };
        },

        async saveKey(p) {
            await fetch(`/api/settings/keys/${p.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: p.newKey })
            });
            p.configured = true;
            p.newKey = '';
            this.showStatus('API key saved');
            this.loadSettings();
        },

        async testKey(p) {
            p.testResult = null;
            const res = await fetch(`/api/settings/keys/${p.id}/test`, { method: 'POST' });
            const data = await res.json();
            p.testResult = data.valid;
            p.testError = data.error || '';
        },

        async deleteKey(p) {
            if (!confirm(`Delete ${p.label} API key?`)) return;
            await fetch(`/api/settings/keys/${p.id}`, { method: 'DELETE' });
            p.configured = false;
            p.masked = '';
            this.showStatus('API key deleted');
        },

        async saveModel(provider, model) {
            await fetch(`/api/settings/models/${provider}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model })
            });
            this.showStatus(`${provider} model set to ${model}`);
        },

        async uploadLogo(e) {
            const file = e.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            await fetch('/api/settings/logo', { method: 'POST', body: formData });
            this.logoMsg = 'Logo uploaded';
            setTimeout(() => this.logoMsg = '', 3000);
        },

        async deleteLogo() {
            await fetch('/api/settings/logo', { method: 'DELETE' });
            this.logoMsg = 'Logo removed';
            setTimeout(() => this.logoMsg = '', 3000);
        },

        showStatus(msg) {
            this.statusMsg = msg;
            setTimeout(() => this.statusMsg = '', 3000);
        }
    };
}
</script>
{% endblock %}
